port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7893
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: :9090
secret: "123456"
external-ui: ui

dns:
  enable: true
  ipv6: false
  listen: :53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 180.76.76.76
    - 114.114.114.114
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

proxies:

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: 🇭🇰 香港节点
    type: select
    proxies:
      - DIRECT

  - name: 🇹🇼 台湾节点
    type: select
    proxies:
      - DIRECT

  - name: 🇯🇵 日本节点
    type: select
    proxies:
      - DIRECT

  - name: 🇰🇷 韩国节点
    type: select
    proxies:
      - DIRECT

  - name: 🇸🇬 新加坡节点
    type: select
    proxies:
      - DIRECT

  - name: 🇺🇸 美国节点
    type: select
    proxies:
      - DIRECT

  - name: 🎥 媒体影音
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: 🎞️ DisneyPlus
    type: select
    proxies:
      - 🚀 节点选择
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇭🇰 香港节点
      - DIRECT

  - name: 📺 ViuTV
    type: select
    proxies:
      - 🇭🇰 香港节点
      - DIRECT

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点

  - name: 🌏 谷歌服务
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点

  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - 🇸🇬 新加坡节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: 🤖 OpenAI
    type: select
    proxies:
      - 🚀 节点选择
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇹🇼 台湾节点
      - DIRECT

  - name: 🎮 游戏平台
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点

  - name: 🧱 墙外网站
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: 🏠 国内网站
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🍃 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇸🇬 新加坡节点
      - 🇺🇸 美国节点
      - DIRECT

