[custom]
; HayGorNoClash 定制 Subconverter 配置文件
; 仿照 ACL4SSR 结构，适配 dler-io/Rules 规则源

; 基础设置
enable_rule_generator=true
overwrite_original_rules=true

; 规则设置 (ruleset=分组名,规则地址)
ruleset=🏠 国内网站,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Domestic.yaml
ruleset=🏠 国内网站,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Domestic%20IPs.yaml
ruleset=🏠 国内网站,[]GEOIP,CN
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/LAN.yaml
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🛑 广告拦截,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/AdBlock.yaml
ruleset=🍎 苹果服务,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Apple.yaml
ruleset=🌏 谷歌服务,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Proxy.yaml
ruleset=🤖 OpenAI,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/AI%20Suite.yaml
ruleset=📲 电报消息,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Telegram.yaml
ruleset=🎥 媒体影音,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Media/Netflix.yaml
ruleset=🎞️ DisneyPlus,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Media/Disney%20Plus.yaml
ruleset=📺 ViuTV,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script/master/rule/Clash/ViuTV/ViuTV.yaml
ruleset=Ⓜ️ 微软服务,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Microsoft.yaml
ruleset=🎮 游戏平台,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Steam.yaml
ruleset=🧱 墙外网站,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Proxy.yaml
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/dler-io/Rules@main/Clash/Provider/Special.yaml
ruleset=🍃 漏网之鱼,[]FINAL

; 策略组设置 (custom_proxy_group=分组名`select`节点正则或引用组)

; 核心选择组
custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT`.*

; 区域节点组 (使用正则匹配)
custom_proxy_group=🇭🇰 香港节点`select`(香港|HK|Hong Kong|HONGKONG|HongKong)
custom_proxy_group=🇹🇼 台湾节点`select`(台湾|TW|Taiwan|Tai Wan|TAIWAN|TaiWan)
custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan|JAPAN)
custom_proxy_group=🇰🇷 韩国节点`select`(韩国|KR|Korea|KOREA|South Korea)
custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore|SINGAPORE)
custom_proxy_group=🇺🇸 美国节点`select`(美国|US|United States|USA|America)

; 分流策略组
custom_proxy_group=🎥 媒体影音`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🎞️ DisneyPlus`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇭🇰 香港节点`[]DIRECT
custom_proxy_group=📺 ViuTV`select`[]🇭🇰 香港节点`[]DIRECT
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点
custom_proxy_group=🌏 谷歌服务`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🤖 OpenAI`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]DIRECT
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇺🇸 美国节点
custom_proxy_group=🧱 墙外网站`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🏠 国内网站`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 漏网之鱼`select`[]🚀 节点选择`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
